# One-click deploy config for Render (render.com).
# Render holds websocket connections open, which Vercel's serverless functions
# can't — that's why this ships here instead of Vercel.
#
# After deploying, set BASE_URL in the dashboard to your live https URL
# (e.g. https://quiplash.onrender.com) so the join QR points to the right place.
services:
  - type: web
    name: quiplash
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: BASE_URL
        sync: false   # your live https URL, e.g. https://quiplash-c4ii.onrender.com
      - key: ADMIN_PASSWORD
        sync: false   # password for the /admin console (unset = admin disabled)
      - key: GITHUB_TOKEN
        sync: false   # fine-grained PAT, Contents:read+write on this repo only
      - key: ENABLE_BOTS
        sync: false   # set to 1 to show the "add test bot" button; leave unset for guests
