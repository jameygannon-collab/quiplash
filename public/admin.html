<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quiplash — Admin</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    /* Admin-only layout — the console is a scrollable document, not a centered
       game screen, so it opts out of the .screen flex-center shell. */
    body { overflow-y: auto; }
    .admin-wrap { width: min(920px, 94vw); margin: 0 auto; padding: 24px 0 72px; text-align: left; }
    .admin-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
    .admin-h { font-family: var(--font-display); font-size: 20px; margin-bottom: 8px; }
    .statgrid { display: flex; flex-wrap: wrap; gap: 10px; }
    .stat { background: var(--bg); border: 1px solid rgba(0,0,0,.15); border-radius: 2px; padding: 12px 16px; min-width: 108px; }
    .statn { font-family: var(--font-display); font-size: 30px; line-height: 1; }
    .statl { font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
    .rtable { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
    .rtable th, .rtable td { text-align: left; padding: 7px 8px; border-bottom: 1px solid rgba(0,0,0,.12); }
    .rtable th { color: var(--ink-muted); text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
    .row2 { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .packcard { margin-top: 12px; }
    .packcard .field { text-align: left; font-size: 16px; padding: 10px 12px; }
    textarea.field { font-family: var(--font-body); line-height: 1.55; resize: vertical; width: 100%; }
    .warnbar { background: var(--warn); color: #1c1710; padding: 8px 12px; border-radius: 2px; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="status" class="status"></div>
  <div id="app" class="screen"></div>
  <script type="module" src="/admin.js"></script>
</body>
</html>
