<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quiplash</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="screen">
    <div class="stack">
      <div class="logo" id="logo">QUIPLASH</div>
      <div class="tagline" id="tagline"></div>
    </div>
    <div class="stack" style="margin-top:20px; width:min(420px,92vw)">
      <a class="btn big block" href="/host">Start the game</a>
      <p class="muted" style="margin:-6px 0 6px; font-size:14px">
        one person opens this on the TV or a laptop — it's the big screen everyone watches.
      </p>
      <a class="btn big block ghost" href="/play">Join on your phone</a>
      <p class="muted" style="margin-top:-6px; font-size:14px">
        everyone else taps here and types the room code shown on the big screen.
      </p>
    </div>
  </div>

  <script type="module">
    import { loadConfig, applyTheme } from '/client.js';
    const cfg = await loadConfig();
    applyTheme(cfg.theme);
    document.getElementById('logo').textContent = cfg.theme.logoText;
    document.getElementById('tagline').textContent = cfg.theme.tagline;
    document.title = cfg.theme.logoText;
  </script>
</body>
</html>
